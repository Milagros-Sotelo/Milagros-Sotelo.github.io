name: Prepare portfolio source

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  expand:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Expand portfolio source
        run: |
          mkdir unpacked
          tar -xzf portfolio-source.tar.gz -C unpacked
          cp -a unpacked/. .
          rm -rf unpacked portfolio-source.tar.gz .github/workflows/bootstrap.yml .github/workflows/deploy-pages.yml

      - name: Publish source files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Publish portfolio source"
          git push
